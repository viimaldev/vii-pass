name = "vii-pass-api"
main = "src/index.ts"
compatibility_date = "2026-07-01"
# nodejs_compat is required for the official `mongodb` driver to run on Workers
# (research.md Decision 2). Do NOT remove.
compatibility_flags = ["nodejs_compat"]

# Cloudflare R2 bucket binding for file/image storage (research.md Decision 4).
# Accessed in code as `env.BUCKET`.
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "vii-pass-files"

# Non-secret configuration only. Secrets (MONGODB_URI) are set with
# `wrangler secret put MONGODB_URI` and are NEVER committed (FR-008, SC-007).
[vars]
MONGODB_DB_NAME = "vii_pass"
ALLOWED_ORIGINS = "http://localhost:5173"
# Session lifetime (research.md Decision 5): sliding inactivity + absolute cap.
SESSION_IDLE_TTL_SECONDS = "1800"
SESSION_ABSOLUTE_TTL_SECONDS = "86400"
# Password hashing work factor (research.md Decision 1).
PBKDF2_ITERATIONS = "600000"
# COOKIE_DOMAIN is intentionally unset locally (host-only cookie). In production
# set it to the shared registrable domain, e.g. ".example.com" (research Decision 4).
