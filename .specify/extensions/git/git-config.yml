# Git Branching Workflow Extension Configuration
# Copied to .specify/extensions/git/git-config.yml on install

# Branch numbering strategy: "sequential" (001, 002, ...), "timestamp"
# (YYYYMMDD-HHMMSS), or "story" (custom topic/vii-<id>-<slug> convention).
branch_numbering: story

# Story-branch convention (used when branch_numbering: story).
# Produces branches like: topic/vii-1000-project-initial-setup
#   branch_prefix            leading path segment of the branch
#   story_id_prefix          git-safe id prefix used IN the branch name
#   story_id_display_prefix  colon form used in commit / PR text. Git forbids ':' in
#                            branch names, so this form is NEVER used in the branch itself.
#   start                    first story id; incremented for each new story
story_branch:
  branch_prefix: "topic/"
  story_id_prefix: "vii-"
  story_id_display_prefix: "vii:"
  start: 1000

# Pull request settings (used by /speckit.create_pr).
#   {story_id}    expands to e.g. "vii:1000"
#   {description} expands to the story description
pull_request:
  base_branch: "main"
  tool: "gitkraken-mcp"
  title_template: "{story_id}: {description}"
  body_template: "{story_id}: {description}"

# Commit message used by `git commit` during repository initialization
init_commit_message: "[Spec Kit] Initial commit"

# Auto-commit before/after core commands.
# Set "default" to enable for all commands, then override per-command.
# Each key can be true/false. Message is customizable per-command.
auto_commit:
  default: false
  before_clarify:
    enabled: false
    message: "[Spec Kit] Save progress before clarification"
  before_plan:
    enabled: false
    message: "[Spec Kit] Save progress before planning"
  before_tasks:
    enabled: false
    message: "[Spec Kit] Save progress before task generation"
  before_implement:
    enabled: false
    message: "[Spec Kit] Save progress before implementation"
  before_checklist:
    enabled: false
    message: "[Spec Kit] Save progress before checklist"
  before_analyze:
    enabled: false
    message: "[Spec Kit] Save progress before analysis"
  before_taskstoissues:
    enabled: false
    message: "[Spec Kit] Save progress before issue sync"
  after_constitution:
    enabled: false
    message: "[Spec Kit] Add project constitution"
  after_specify:
    enabled: false
    message: "[Spec Kit] Add specification"
  after_clarify:
    enabled: false
    message: "[Spec Kit] Clarify specification"
  after_plan:
    enabled: false
    message: "[Spec Kit] Add implementation plan"
  after_tasks:
    enabled: false
    message: "[Spec Kit] Add tasks"
  after_implement:
    enabled: false
    message: "[Spec Kit] Implementation progress"
  after_checklist:
    enabled: false
    message: "[Spec Kit] Add checklist"
  after_analyze:
    enabled: false
    message: "[Spec Kit] Add analysis report"
  after_taskstoissues:
    enabled: false
    message: "[Spec Kit] Sync tasks to issues"
